app = "zigzag-bot-package"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # ✅ Правильний health check (вкладений масив)
  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "180s"
    http_path = "/health"
    method = "GET"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[experimental]
  auto_rollback = true