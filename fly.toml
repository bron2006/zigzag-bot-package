# fly.toml

app = "zigzag-bot-package"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # --- ПОЧАТОК ЗМІН: Додаємо перевірку працездатності ---
  # Це буде "тримати в тонусі" наш сервер, не даючи йому заснути
  [[http_service.checks]]
    interval = "15s" # Перевіряти кожні 15 секунд
    timeout = "2s"   # Давати 2 секунди на відповідь
    method = "GET"
    path = "/"       # Робити запит на головну сторінку
  # --- КІНЕЦЬ ЗМІН ---

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[experimental]
  auto_rollback = true