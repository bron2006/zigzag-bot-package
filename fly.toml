# fly.toml
app = 'zigzag-bot-package'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true # Можна повернути true для економії, або залишити false
  auto_start_machines = true
  min_machines_running = 0 # Встановлюємо 0, щоб машина могла засинати, якщо не використовується

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source="signals_data"
  destination="/data"

# --- ПОЧАТОК ЗМІН: Повертаємо один процес ---
[processes]
  app = "python app.py"
# --- КІНЕЦЬ ЗМІН ---

# --- ПОЧАТОК ЗМІН: Додаємо налаштування, щоб машина не засинала ---
[experimental]
  auto_stop_machines = false
# --- КІНЕЦЬ ЗМІН ---