# fly.toml
app = 'zigzag-bot-package'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false # Залишаємо false, щоб сканер не засинав
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"] # <--- ОСЬ КЛЮЧОВЕ ВИПРАВЛЕННЯ

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source="signals_data"
  destination="/data"

[processes]
  app = "python app.py"