app = "zigzag-bot-package"

[build]
  dockerfile = "Dockerfile"

# --- ЗМІНЕНО: Додано секцію для змінних оточення ---
[env]
  # Цей рядок змушує protobuf використовувати надійну Python-реалізацію
  # для уникнення проблем з C++ розширеннями в Docker.
  PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION = "python"
# --- КІНЕЦЬ ЗМІН ---

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "180s"
    http_path = "/health"
    method = "GET"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[experimental]
  auto_rollback = true