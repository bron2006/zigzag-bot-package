# fly.toml
app = 'zigzag-bot-package'
primary_region = 'fra'

[build]

# "Обличчя" - публічний веб-сервер, що запускається через Gunicorn
[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = "signals_data"
  destination = "/data"

# "Мозок" - внутрішній сервіс, який слухає команди на порту 8081
[[services]]
  internal_port = 8081
  processes = ["worker"]

[processes]
  app = "gunicorn --worker-class gevent --bind 0.0.0.0:8080 app:app"
  worker = "python worker.py"