# fly.toml
app = "zigzag-bot-package"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false # ЗМІНЕНО: Забороняємо авто-зупинку
  auto_start_machines = true
  min_machines_running = 1   # ЗМІНЕНО: Гарантуємо, що 1 машина завжди працює
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s" # Збільшено інтервал для надійності
    timeout = "10s"  # Збільшено таймаут
    method = "GET"
    path = "/health"
    grace_period = "60s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[experimental]
  auto_rollback = true