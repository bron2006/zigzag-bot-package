# fly.toml

app = 'zigzag-bot-package'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1 # MODIFIED: Веб-сервер має працювати постійно
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source="signals_data"
  destination="/data"

# MODIFIED: Описуємо два окремі процеси
[processes]
  app = "gunicorn --worker-class gevent --workers 4 --bind 0.0.0.0:8080 app:app"
  worker = "python worker.py"