# fly.toml
app = "zigzag-bot-package"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "20s"
    timeout = "5s"
    method = "GET"
    path = "/health" # ЗМІНЕНО: Повертаємо на надійний шлях для перевірки
    grace_period = "90s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[experimental]
  auto_rollback = true