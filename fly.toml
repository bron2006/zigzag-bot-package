# fly.toml
app = 'zigzag-bot-package'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = "signals_data"
  destination = "/data"

# MODIFIED: Залишаємо лише один процес app
[processes]
  app = "gunicorn --worker-class gevent --bind 0.0.0.0:8080 app:app"