# fly.toml

app = "zigzag-bot-package"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # --- ПОЧАТОК ЗМІН: Додаємо перевірку працездатності ---
  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    method = "GET"
    path = "/" # Перевіряємо головну сторінку, яка має повернути "ZigZag Bot v4.3 Backend..."
  # --- КІНЕЦЬ ЗМІН ---

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[experimental]
  auto_rollback = true