app = "zigzag-bot-package"

# Вказуємо, що використовуємо Dockerfile для збірки
[build]
  dockerfile = "Dockerfile"

# Налаштування HTTP-сервісу
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

# Налаштування віртуальної машини
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Додаємо секцію для експериментальних функцій
[experimental]
  auto_rollback = true