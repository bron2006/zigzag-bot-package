# fly.toml
app = "zigzag-bot-package"
primary_region = "fra"

[build]

[processes]
  app = "gunicorn --bind 0.0.0.0:8080 --workers 1 app:app"

[[mounts]]
  source = "signals_data"
  destination = "/data"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  processes = ["app"]

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    restart_limit = 0