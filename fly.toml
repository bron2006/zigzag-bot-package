# fly.toml
app = 'zigzag-bot-package'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app'] # Зовнішній трафік йде лише на 'app'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source="signals_data"
  destination="/data"

# --- ПОЧАТОК ЗМІН: Оголошуємо два незалежні процеси ---
[processes]
  app = "python app.py"
  worker = "python worker.py"
# --- КІНЕЦЬ ЗМІН ---