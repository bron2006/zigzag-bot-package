# fly.toml

app = "zigzag-bot-package"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION = "python"

# ПОВЕРТАЄМОСЯ ДО СТАНДАРТНОЇ КОНФІГУРАЦІЇ ДЛЯ ВЕБ-СЕРВІСУ
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0 # Встановіть 1, якщо бот має працювати постійно
  processes = ["app"]

# Видаляємо [processes], оскільки flyctl автоматично
# запустить команду з Dockerfile (CMD ["python", "main.py"])
# або ми можемо вказати її тут. Краще оновити Dockerfile.
# Ми оновимо Dockerfile, щоб він запускав run.py