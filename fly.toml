# fly.toml file generated for zigzag-bot-package on 2025-08-26T19:35:46+03:00

app = 'zigzag-bot-package'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source="signals_data"
  destination="/data"

# --- ПОЧАТОК ЗМІН: Змінюємо команду запуску ---
[processes]
  app = "python app.py"
# --- КІНЕЦЬ ЗМІН ---