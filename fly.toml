# fly.toml
app = 'zigzag-bot-package'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  
  # --- ПОЧАТОК ЗМІН: Додано пільговий період для запуску додатку ---
  grace_period = "15s"
  # --- КІНЕЦЬ ЗМІН ---

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source="signals_data"
  destination="/data"

[processes]
  app = "python app.py"