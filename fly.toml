# fly.toml

app = "zigzag-bot-package"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
  
  # --- ПОЧАТОК ЗМІН: Даємо боту 30 секунд на "прогрів" ---
  grace_period = "30s"
  # --- КІНЕЦЬ ЗМІН ---

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    method = "GET"
    path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[experimental]
  auto_rollback = true