# fly-streamer.toml
app = "zigzag-bot-streamer"
primary_region = "fra"

[build]

[env]
  PYTHONUNBUFFERED = "1"

[processes]
  streamer = "python price_streamer.py"

# --- ПОЧАТОК ЗМІН: Повернено мінімальну конфігурацію сервісу ---
# Це необхідно, щоб платформа fly.io коректно керувала процесом
[[services]]
  internal_port = 8080
  processes = ["streamer"]
  protocol = "tcp"
# --- КІНЕЦЬ ЗМІН ---