<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZigZag AI Analytics PRO</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card: #161b2c;
            --accent: #3b82f6;
            --text: #e2e8f0;
            --buy: #10b981;
            --sell: #ef4444;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header { text-align: center; margin: 20px 0; }
        .header h2 { color: var(--accent); margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }
        
        h3 { width: 100%; max-width: 500px; color: #64748b; font-size: 12px; text-transform: uppercase; margin: 25px 0 10px 5px; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 500px; }
        
        .btn {
            background: var(--card);
            border: 1px solid #2d3748;
            border-radius: 16px;
            padding: 22px 10px;
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn:active { transform: scale(0.95); background: #1e2538; }

        #result-box {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: 24px;
            padding: 30px 20px;
            margin-top: 30px;
            border: 1px solid var(--accent);
            box-sizing: border-box;
            text-align: center;
        }

        .verdict { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; }
        .arrow { font-size: 85px; line-height: 1; margin-bottom: 5px; }
        .v-text { font-size: 36px; font-weight: 900; text-transform: uppercase; }
        .buy { color: var(--buy); }
        .sell { color: var(--sell); }

        #description {
            font-size: 15px;
            line-height: 1.7;
            color: #94a3b8;
            text-align: left;
            border-top: 1px solid #2d3748;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header"><h2>ZigZag AI Analytics</h2></div>

    <h3>Криптовалюти</h3>
    <div class="grid">
        <button class="btn" onclick="send('BTCUSD')">BTC / USD</button>
        <button class="btn" onclick="send('ETHUSD')">ETH / USD</button>
        <button class="btn" onclick="send('SOLUSD')">SOL / USD</button>
        <button class="btn" onclick="send('BNBUSD')">BNB / USD</button>
    </div>

    <h3>Сировина</h3>
    <div class="grid">
        <button class="btn" onclick="send('XAUUSD')">GOLD (XAU)</button>
        <button class="btn" onclick="ask('WTI')">OIL (WTI)</button>
    </div>

    <div id="result-box">
        <div class="verdict" id="v-ui">
            <span style="color: #475569; font-size: 16px;">Оберіть пару</span>
        </div>
        <div id="description">Чекаю на дані...</div>
    </div>

    <script>
        async function send(pair) {
            const v = document.getElementById('v-ui');
            const d = document.getElementById('description');
            v.innerHTML = '<span style="font-size: 18px;">Аналіз...</span>';
            try {
                const r = await fetch('/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ pair: pair })
                });
                const data = await r.json();
                if (data.signal === 'BUY') {
                    v.innerHTML = '<span class="arrow buy">⬆️</span><span class="v-text buy">BUY</span>';
                } else if (data.signal === 'SELL') {
                    v.innerHTML = '<span class="arrow sell">⬇️</span><span class="v-text sell">SELL</span>';
                } else {
                    v.innerHTML = '<span class="v-text">NEUTRAL</span>';
                }
                d.innerHTML = data.analysis;
            } catch (e) { v.innerHTML = 'Error'; }
        }
    </script>
</body>
</html>
