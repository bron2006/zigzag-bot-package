<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>ZigZag | Бінарні опціони</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.API_BASE_URL = "{{API_BASE_URL}}";
    </script>
</head>
<body>
    <div class="container">
        <h1>Термінал | Бінарні Опціони</h1>
        <div class="controls-panel">
            <input type="search" id="searchInput" class="search-input" placeholder="🔍 Пошук...">
            <div id="expirationSelector" class="timeframe-selector">
                <button class="tf-button active" data-exp="1m">Експірація 1 хв</button>
                <button class="tf-button" data-exp="5m">Експірація 5 хв</button>
            </div>
            <div id="scannerControls" class="scanner-controls">
                <button class="scanner-button" data-cat="forex">💹 Валюти</button>
                <button class="scanner-button" data-cat="crypto">💎 Криптовалюти</button>
                <button class="scanner-button" data-cat="commodities">🥇 Сировина</button>
                <button class="scanner-button" data-cat="watchlist">⭐ Обране</button>
            </div>
        </div>

        <div id="liveSignalsContainer"></div>

        <div id="listsContainer"></div>
        <div class="separator"></div>
        <div id="signalContainer">
            <div id="signalOutput">Оберіть актив для аналізу...</div>
        </div>
        <div id="loader" class="hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
