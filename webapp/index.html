<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>ZigZag | Binary Options</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.API_BASE_URL = "{{API_BASE_URL}}";
    </script>
</head>
<body>
    <div class="container">
        <h1 id="appTitle">Terminal | Binary Options</h1>
        <div class="controls-panel">
            <input type="search" id="searchInput" class="search-input" placeholder="🔍 Search...">
            <div id="expirationSelector" class="timeframe-selector">
                <button class="tf-button active" data-exp="1m">Expiration 1 min</button>
                <button class="tf-button" data-exp="5m">Expiration 5 min</button>
            </div>
            <div id="scannerControls" class="scanner-controls">
                <button class="scanner-button" data-cat="forex">💹 Currencies</button>
                <button class="scanner-button" data-cat="crypto">💎 Crypto</button>
                <button class="scanner-button" data-cat="commodities">🥇 Commodities</button>
                <button class="scanner-button" data-cat="watchlist">⭐ Favorites</button>
            </div>
        </div>

        <div id="liveSignalsContainer"></div>

        <div id="listsContainer"></div>
        <div class="separator"></div>
        <div id="signalContainer">
            <div id="signalOutput">Choose an asset for analysis...</div>
        </div>
        <div id="loader" class="hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
