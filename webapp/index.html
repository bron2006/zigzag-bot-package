<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>ZigZag WebApp</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        window.API_BASE_URL = "{{API_BASE_URL}}";
    </script>
</head>
<body>
    <div class="container">
        <h1>Термінал</h1>
        <div class="controls-panel">
            <input type="search" id="searchInput" class="search-input" placeholder="🔍 Пошук...">
            <div id="timeframeSelector" class="timeframe-selector">
                <button class="tf-button active" data-tf="1m">1m</button>
                <button class="tf-button" data-tf="5m">5m</button>
                <button class="tf-button" data-tf="15m">15m</button>
            </div>
        </div>
        <div id="listsContainer"></div>
        <div class="separator"></div>
        <div id="signalContainer">
            <div id="signalOutput">Виберіть актив для аналізу...</div>
            <div id="chart"></div>
            <div id="historyContainer"></div>
        </div>
        <div id="loader" class="hidden"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
